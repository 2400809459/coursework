<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Universities in Uganda</title>
    <style>
        body{
            font-family: Arial, sans-serif;
            margin:40px;
        }
        h1{
            text-decoration: underline;
        }
        .university{
            margin-bottom:20px;
        }
        .uni-name{
            font-weight:bold;
            text-decoration: underline;
        }
    </style>
</head>
<body>

<h1>Universities In Uganda</h1>

<ul>

    <li class="university">
        <span class="uni-name">Kyambogo</span>
        <ol type="i">
            <li>Mechanics</li>
            <li>Computing</li>
            <li>Social Works</li>
        </ol>
    </li>

    <li class="university">
        <span class="uni-name">Makerere</span>
        <ol>
            <li>Computing</li>
            <li>Medicine
                <ul>
                    <li>Nursing</li>
                    <li>Surgery</li>
                </ul>
            </li>
        </ol>
    </li>

    <li class="university">
        <span class="uni-name">Mbarara</span>
        <ul>
            <li>Engineering</li>
            <li>Science</li>
            <li>Technology</li>
        </ul>
    </li>

</ul>

</body>
</html>
